services:
  - type: web
    name: movie-earning-bot
    runtime: python
    region: singapore  # भारत के पास
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false  # Render डैशबोर्ड में सेट करें
      - key: ADMIN_IDS
        value: "6357654427"
      - key: MONGO_URI
        sync: false  # Render डैशबोर्ड में सेट करें
      - key: WEB_APP_URL
        value: https://your-app-name.onrender.com
      - key: PORT
        value: 10000
    autoDeploy: true
