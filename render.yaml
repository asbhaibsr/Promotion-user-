services:
  - type: web
    name: filmyfund-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app & python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: LOG_CHANNEL_ID
        sync: false
      - key: CHANNEL_ID
        sync: false
      - key: CHANNEL_LINK
        sync: false
      - key: MOVIE_GROUP_LINK
        sync: false
      - key: NEW_GROUP_LINK
        sync: false
      - key: ALL_GROUPS_LINK
        sync: false
      - key: SUPPORT_USERNAME
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: ENVIRONMENT
        value: production
